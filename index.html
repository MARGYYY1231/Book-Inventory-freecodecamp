<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>Book Inventory</h1>
    <main>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Status</th>
            <th>Rate</th>
          </tr>
        </thead>
        <tbody>
          <tr class="read">
            <td>Percy Jackson and the Sea of Monsters</td>
            <td>Rick Riordan</td>
            <td>Fanstasy Adventure</td>
            <td>
              <span class="status">Read</span>
            </td>
            <td>
              <span class="rate three">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </td>
          </tr>
          <tr class="read">
            <td>Twilight</td>
            <td>Stephenie Meyer</td>
            <td>Romance</td>
            <td>
              <span class="status">Read</span>
            </td>
            <td>
              <span class="rate two">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </td>
          </tr>
          <tr class="in-progress">
            <td>New Moon</td>
            <td>Stephenie Meyer</td>
            <td>Romance</td>
            <td>
              <span class="status">In Progress</span>
            </td>
            <td>
              <span class="rate">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </td>
          </tr>
          <tr class="to-read">
            <td>Magnus Chase</td>
            <td>Rick Riordan</td>
            <td>Adventure Fantasy</td>
            <td>
              <span class="status">To Read</span>
            </td>
            <td>
              <span class="rate">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
